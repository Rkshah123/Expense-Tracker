<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Expense Tracker</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container mt-5">

        <h2 class="text-center mb-4">
            Expense Tracker
        </h2>

        <div class="row g-3">

            <!-- Amount -->

            <div class="col-md-3">

                <input
                    type="number"
                    id="amount"
                    class="form-control"
                    placeholder="Expense Amount">

            </div>

            <!-- Description -->

            <div class="col-md-3">

                <select
                    id="description"
                    class="form-select">

                    <option value="">
                        Choose Description
                    </option>

                    <option>Petrol</option>
                    <option>Groceries</option>
                    <option>Restaurant</option>
                    <option>Movie Ticket</option>
                    <option>Electricity Bill</option>

                </select>

            </div>

            <!-- Category -->

            <div class="col-md-3">

                <select
                    id="category"
                    class="form-select">

                    <option value="">
                        Choose Category
                    </option>

                    <option>Food</option>
                    <option>Travel</option>
                    <option>Shopping</option>
                    <option>Entertainment</option>

                </select>

            </div>

            <!-- Button -->

            <div class="col-md-3">

                <button
                    id="addBtn"
                    class="btn btn-primary w-100">

                    Add Expense

                </button>

            </div>

        </div>

        <hr>

        <!-- Expense List -->

        <ul
            id="expenseList"
            class="list-group">

        </ul>

    </div>

    <script src="script.js"></script>

</body>

</html>
